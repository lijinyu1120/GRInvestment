<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>债券数据仪表板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #a8d8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .timestamp-selector {
            margin-bottom: 20px;
            text-align: center;
        }

        .timestamp-selector select {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .timestamp-selector select option {
            background: #2a5298;
            color: #fff;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .market-values {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .market-values h2 {
            font-size: 1.8em;
            margin-bottom: 25px;
            color: #a8d8ff;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .price-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .price-card h3 {
            font-size: 0.9em;
            color: #a8d8ff;
            margin-bottom: 10px;
        }

        .price-value {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .price-value.buy { color: #4ade80; }
        .price-value.mid { color: #fff; }
        .price-value.sell { color: #f87171; }

        .yield-info {
            font-size: 0.9em;
            color: #cbd5e1;
            margin-bottom: 5px;
        }

        .change-info {
            font-size: 0.85em;
        }

        .change-positive { color: #4ade80; }
        .change-negative { color: #f87171; }
        .change-neutral { color: #94a3b8; }

        .chart-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .chart-placeholder {
            background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.1));
            border-radius: 15px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a8d8ff;
            font-size: 1.2em;
        }

        .risk-indicators {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .risk-indicators h2 {
            font-size: 1.8em;
            margin-bottom: 25px;
            color: #a8d8ff;
        }

        .risk-table {
            width: 100%;
            border-collapse: collapse;
        }

        .risk-table th {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 10px;
            text-align: center;
            font-size: 0.9em;
            color: #a8d8ff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .risk-table td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .risk-table td:first-child {
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            font-weight: 500;
        }

        .risk-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .loading {
            text-align: center;
            color: #a8d8ff;
            font-size: 1.2em;
            margin: 50px 0;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .price-grid {
                grid-template-columns: 1fr;
            }
            
            .price-value {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>债券数据仪表板</h1>
            <p>实时债券市场估值与风险指标</p>
        </div>

        <div class="timestamp-selector">
            <select id="timestampSelect">
                <option value="">选择时间点...</option>
            </select>
        </div>

        <div id="loadingMessage" class="loading">
            正在加载数据...
        </div>

        <div id="mainContent" style="display: none;">
            <div class="main-grid">
                <div class="market-values">
                    <h2>市场估值</h2>
                    <div class="price-grid">
                        <div class="price-card">
                            <h3>买价</h3>
                            <div class="price-value buy" id="buyPrice">--</div>
                            <div class="yield-info" id="buyYield">收益率: --</div>
                            <div class="change-info" id="buyChange">涨跌: --</div>
                        </div>
                        <div class="price-card">
                            <h3>中间价</h3>
                            <div class="price-value mid" id="midPrice">--</div>
                            <div class="yield-info" id="midYield">收益率: --</div>
                            <div class="change-info" id="midChange">涨跌: --</div>
                        </div>
                        <div class="price-card">
                            <h3>卖价</h3>
                            <div class="price-value sell" id="sellPrice">--</div>
                            <div class="yield-info" id="sellYield">收益率: --</div>
                            <div class="change-info" id="sellChange">涨跌: --</div>
                        </div>
                    </div>
                </div>

                <div class="chart-container">
                    <h2 style="color: #a8d8ff; margin-bottom: 20px;">价格走势图</h2>
                    <div class="chart-placeholder">
                        历史价格图表
                        <br><small>可集成 Chart.js 或其他图表库</small>
                    </div>
                </div>
            </div>

            <div class="risk-indicators">
                <h2>风险指标</h2>
                <table class="risk-table">
                    <thead>
                        <tr>
                            <th>风险指标</th>
                            <th>买价</th>
                            <th>中间价</th>
                            <th>卖价</th>
                        </tr>
                    </thead>
                    <tbody id="riskTableBody">
                        <!-- Dynamic content will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Sample data structure - replace with your CSV data
        const sampleData = [
            {
                timestamp: "2025-08-03 14:30:00",
                "价格_买价": "93.114",
                "价格_中间价": "93.236", 
                "价格_卖价": "93.358",
                "涨跌额_买价": "-0.012",
                "涨跌额_中间价": "--",
                "涨跌额_卖价": "+0.012",
                "最差收益率(YTW)_买价": "14.657",
                "最差收益率(YTW)_中间价": "14.466",
                "最差收益率(YTW)_卖价": "14.277",
                "到期收益率(YTM)_买价": "14.657",
                "到期收益率(YTM)_中间价": "14.466", 
                "到期收益率(YTM)_卖价": "14.277",
                "流动性分数_买价": "1.000",
                "流动性分数_中间价": "1.000",
                "流动性分数_卖价": "1.000",
                "G利差_买价": "1038.784",
                "G利差_中间价": "1024.687",
                "G利差_卖价": "1010.624",
                "I利差_买价": "1050.780",
                "I利差_中间价": "1050.780",
                "I利差_卖价": "1050.780",
                "T利差_买价": "1068.035",
                "T利差_中间价": "1051.508",
                "T利差_卖价": "1035.015",
                "Z利差_买价": "943.113",
                "Z利差_中间价": "927.483",
                "Z利差_卖价": "911.871",
                "麦考利久期_买价": "0.736",
                "麦考利久期_中间价": "0.736",
                "麦考利久期_卖价": "0.736",
                "修正久期_买价": "0.685",
                "修正久期_中间价": "0.686",
                "修正久期_卖价": "0.686",
                "凸性_买价": "0.791",
                "凸性_中间价": "0.792",
                "凸性_卖价": "0.793",
                "应付利息": "0.037",
                "30天成交量": "10020000.000"
            }
        ];

        let bondData = [];

        // Initialize the dashboard
        function initializeDashboard() {
            // In a real implementation, you would load CSV data here
            // For now, we'll use sample data
            bondData = sampleData;
            populateTimestampSelector();
            displayLatestData();
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }

        function populateTimestampSelector() {
            const select = document.getElementById('timestampSelect');
            select.innerHTML = '<option value="">选择时间点...</option>';
            
            bondData.forEach((data, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = data.timestamp;
                select.appendChild(option);
            });

            select.addEventListener('change', function() {
                if (this.value !== '') {
                    displayData(bondData[parseInt(this.value)]);
                }
            });
        }

        function displayLatestData() {
            if (bondData.length > 0) {
                const latestData = bondData[bondData.length - 1];
                displayData(latestData);
                document.getElementById('timestampSelect').value = bondData.length - 1;
            }
        }

        function displayData(data) {
            // Update market values
            document.getElementById('buyPrice').textContent = data["价格_买价"] || '--';
            document.getElementById('midPrice').textContent = data["价格_中间价"] || '--';
            document.getElementById('sellPrice').textContent = data["价格_卖价"] || '--';

            // Update yield information
            document.getElementById('buyYield').textContent = `收益率: ${data["最差收益率(YTW)_买价"] || '--'}%`;
            document.getElementById('midYield').textContent = `收益率: ${data["最差收益率(YTW)_中间价"] || '--'}%`;
            document.getElementById('sellYield').textContent = `收益率: ${data["最差收益率(YTW)_卖价"] || '--'}%`;

            // Update change information
            updateChangeInfo('buyChange', data["涨跌额_买价"]);
            updateChangeInfo('midChange', data["涨跌额_中间价"]);
            updateChangeInfo('sellChange', data["涨跌额_卖价"]);

            // Update risk indicators table
            updateRiskTable(data);
        }

        function updateChangeInfo(elementId, changeValue) {
            const element = document.getElementById(elementId);
            if (!changeValue || changeValue === '--') {
                element.textContent = '涨跌: --';
                element.className = 'change-info change-neutral';
            } else {
                element.textContent = `涨跌: ${changeValue}`;
                if (changeValue.startsWith('+')) {
                    element.className = 'change-info change-positive';
                } else if (changeValue.startsWith('-')) {
                    element.className = 'change-info change-negative';
                } else {
                    element.className = 'change-info change-neutral';
                }
            }
        }

        function updateRiskTable(data) {
            const tbody = document.getElementById('riskTableBody');
            tbody.innerHTML = '';

            const riskIndicators = [
                '价格',
                '涨跌额', 
                '最差收益率(YTW)',
                '到期收益率(YTM)',
                '流动性分数',
                'G利差',
                'I利差', 
                'T利差',
                'Z利差',
                '麦考利久期',
                '修正久期',
                '凸性'
            ];

            riskIndicators.forEach(indicator => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${indicator}</td>
                    <td>${data[`${indicator}_买价`] || '--'}</td>
                    <td>${data[`${indicator}_中间价`] || '--'}</td>
                    <td>${data[`${indicator}_卖价`] || '--'}</td>
                `;
                tbody.appendChild(row);
            });

            // Add single-value indicators
            const singleValueIndicators = [
                { key: '应付利息', label: '应付利息' },
                { key: '30天成交量', label: '30天成交量' }
            ];

            singleValueIndicators.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.label}</td>
                    <td colspan="3" style="text-align: center;">${data[item.key] || '--'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Load CSV data function (to be implemented)
        function loadCSVData() {
            // This function should load your CSV file
            // You can use Papa Parse library or fetch API to load CSV from S3
            // For now, we'll use sample data
            return Promise.resolve(sampleData);
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initializeDashboard);
    </script>
</body>
</html>
